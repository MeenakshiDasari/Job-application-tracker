<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">
            Edit Job Application
        </div>

        <div class="card-body">

            <form action="/update-job" method="post">

                <input type="hidden"
                       name="id"
                       th:value="${job.id}">

                <div class="mb-3">

                    <label>Company</label>

                    <input type="text"
                           name="company"
                           class="form-control"
                           th:value="${job.company}">

                </div>

                <div class="mb-3">

                    <label>Role</label>

                    <input type="text"
                           name="role"
                           class="form-control"
                           th:value="${job.role}">

                </div>

                <div class="mb-3">

                    <label>Status</label>

                    <select name="status"
                            class="form-control">

                        <option>Applied</option>
                        <option>Interview Scheduled</option>
                        <option>Rejected</option>
                        <option>Offer Received</option>

                    </select>

                </div>

                <button class="btn btn-success">
                    Update
                </button>

                <a href="/dashboard"
                   class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
