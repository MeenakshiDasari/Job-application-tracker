<!DOCTYPE html> <html xmlns:th="http://www.thymeleaf.org"> <head> <title>Job Tracker Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head> <body class="bg-light"> <div class="container mt-4">
<h1 class="text-center mb-4">
    Job Tracker Dashboard
</h1>

<div class="row mb-4">

    <div class="col-md-3">
        <div class="card bg-primary text-white shadow">
            <div class="card-body text-center">
                <h5>Total Applications</h5>
                <h2 th:text="${#lists.size(jobs)}">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-success text-white shadow">
            <div class="card-body text-center">
                <h5>Applied</h5>
                <h2 th:text="${appliedCount}">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-warning text-dark shadow">
            <div class="card-body text-center">
                <h5>Interview</h5>
                <h2 th:text="${interviewCount}">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-danger text-white shadow">
            <div class="card-body text-center">
                <h5>Rejected</h5>
                <h2 th:text="${rejectedCount}">0</h2>
            </div>
        </div>
    </div>

</div>

<div class="card shadow mb-4">

    <div class="card-header bg-dark text-white">
        Add New Job Application
    </div>

    <div class="card-body">

        <form action="/add-job" method="post">

            <div class="row">

                <div class="col-md-4">
                    <input type="text"
                           name="company"
                           class="form-control"
                           placeholder="Company Name"
                           required>
                </div>

                <div class="col-md-4">
                    <input type="text"
                           name="role"
                           class="form-control"
                           placeholder="Role"
                           required>
                </div>

                <div class="col-md-3">
                    <select name="status"
                            class="form-control">

                        <option>Applied</option>
                        <option>Interview Scheduled</option>
                        <option>Rejected</option>
                        <option>Offer Received</option>

                    </select>
                </div>

                <div class="col-md-1">
                    <button type="submit"
                            class="btn btn-success w-100">
                        Add
                    </button>
                </div>

            </div>

        </form>

    </div>

</div>

<div class="card shadow">

    <div class="card-header bg-primary text-white">
        Job Applications
    </div>

    <div class="card-body">

        <table class="table table-bordered table-hover">

          <thead class="table-dark">
<tr>
    <th>ID</th>
    <th>Company</th>
    <th>Role</th>
    <th>Status</th>
    <th>Edit</th>
    <th>Delete</th>
</tr>
</thead>

            <tbody>
<tr th:each="job : ${jobs}">

    <td th:text="${job.id}"></td>

    <td th:text="${job.company}"></td>

    <td th:text="${job.role}"></td>

    <td th:text="${job.status}"></td>

    <td>
        <a th:href="@{'/edit-job/' + ${job.id}}"
           class="btn btn-warning btn-sm">
            Edit
        </a>
    </td>

    <td>
        <a th:href="@{'/delete-job/' + ${job.id}}"
           class="btn btn-danger btn-sm">
            Delete
        </a>
    </td>

</tr>

            </tbody>

        </table>

    </div>

</div>
</div> </body> </html>
