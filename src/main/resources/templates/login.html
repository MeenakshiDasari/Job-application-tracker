<!DOCTYPE html>
<html>
<head>
    <title>Job Tracker Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#141e30,#243b55);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:450px;
            border:none;
            border-radius:20px;
            overflow:hidden;
            background:white;
        }

        .card-header{
            background:linear-gradient(135deg,#0d6efd,#0056d2);
            color:white;
            text-align:center;
            padding:30px;
        }

        .card-body{
            padding:30px;
        }

        .btn-login{
            width:100%;
            height:45px;
            font-size:18px;
        }

        .logo{
            font-size:50px;
        }

    </style>
</head>

<body>

<div class="card login-card shadow-lg">

    <div class="card-header">

        <div class="logo">💼</div>

        <h2>Job Tracker</h2>
        <p th:if="${error}"
   class="text-danger text-center">
    Invalid Email or Password
</p>

        <p>Track Applications & Interviews</p>

    </div>

    <form action="/login" method="post">

    <div class="mb-3">

        <label>Email</label>

        <input type="email"
               name="email"
               class="form-control"
               placeholder="Enter Email"
               required>

    </div>

    <div class="mb-3">

        <label>Password</label>

        <input type="password"
               name="password"
               class="form-control"
               placeholder="Enter Password"
               required>

    </div>

    <button type="submit"
            class="btn btn-success btn-login">

        Login

    </button>

</form>

</div>

</body>
</html>
